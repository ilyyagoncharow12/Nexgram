<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexgram - Завершение регистрации</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Unbounded', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 420px; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #64748b;
            font-size: 14px;
            margin-top: 8px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Unbounded', cursive;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .username-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        .username-status { margin-top: 4px; font-size: 12px; }
        .avatar-section { margin-bottom: 24px; }
        .avatar-title {
            color: #1e293b;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .avatar-option {
            cursor: pointer;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid transparent;
            transition: all 0.2s;
            aspect-ratio: 1;
        }
        .avatar-option:hover { transform: scale(1.05); }
        .avatar-option.selected {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.3);
        }
        .avatar-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Unbounded', cursive;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>Nexgram</h1>
                <p>Почти готово!</p>
            </div>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" name="username" id="username" placeholder="username" required oninput="checkUsername(this.value)">
                    <div class="username-hint">Можно использовать латиницу, цифры и _</div>
                    <div class="username-status" id="usernameStatus"></div>
                </div>

                <div class="form-group">
                    <label>Отображаемое имя</label>
                    <input type="text" name="display_name" placeholder="Ваше имя" required>
                    <div class="username-hint">Как вас будут видеть другие пользователи</div>
                </div>

                <div class="avatar-section">
                    <div class="avatar-title">Выберите аватар</div>
                    <div class="avatar-grid">
                        {% for avatar in avatars %}
                        <div class="avatar-option" onclick="selectAvatar(this, 'static/avatar-swg/{{ avatar.filename }}')">
                            <img src="/static/avatar-swg/{{ avatar.filename }}" alt="avatar">
                        </div>
                        {% endfor %}
                    </div>
                    <input type="hidden" name="avatar" id="selectedAvatar" value="">
                </div>

                <button type="submit" class="btn" id="submitBtn">Завершить регистрацию</button>
            </form>
        </div>
    </div>

    <script>
        let usernameAvailable = false;

        function selectAvatar(element, path) {
            document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('selectedAvatar').value = path;
        }

        function checkUsername(username) {
            const status = document.getElementById('usernameStatus');
            const submitBtn = document.getElementById('submitBtn');

            if (username.length < 3) {
                status.textContent = '❌ Минимум 3 символа';
                status.style.color = '#dc2626';
                usernameAvailable = false;
                submitBtn.disabled = true;
                return;
            }

            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                status.textContent = '❌ Только латиница, цифры и _';
                status.style.color = '#dc2626';
                usernameAvailable = false;
                submitBtn.disabled = true;
                return;
            }

            fetch('/api/check_username', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username })
            })
            .then(r => r.json())
            .then(data => {
                if (data.available) {
                    status.textContent = '✓ Имя свободно';
                    status.style.color = '#10b981';
                    usernameAvailable = true;
                    submitBtn.disabled = false;
                } else {
                    status.textContent = '❌ Имя занято';
                    status.style.color = '#dc2626';
                    usernameAvailable = false;
                    submitBtn.disabled = true;
                }
            });
        }

        // Выбрать первый аватар по умолчанию
        document.addEventListener('DOMContentLoaded', () => {
            const firstAvatar = document.querySelector('.avatar-option');
            if (firstAvatar) {
                selectAvatar(firstAvatar, 'static/avatar-swg/avatar1.jpg');
            }
        });
    </script>
</body>
</html>
