<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=yes">
    <title>Nexgram · Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            font-family: 'Unbounded', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: clamp(24px, 6vw, 40px) clamp(20px, 5vw, 32px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            width: 100%;
            transition: all 0.3s ease;
        }

        .logo {
            text-align: center;
            margin-bottom: clamp(24px, 5vw, 32px);
        }

        .logo h1 {
            font-size: clamp(36px, 9vw, 48px);
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #64748b;
            font-size: clamp(12px, 3.5vw, 14px);
            margin-top: 6px;
            font-weight: 400;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 16px;
        }

        .tab {
            flex: 1;
            padding: clamp(10px, 3vw, 12px) 8px;
            background: none;
            border: none;
            font-family: 'Unbounded', cursive;
            font-size: clamp(13px, 3.5vw, 15px);
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            white-space: nowrap;
            -webkit-touch-callout: none;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .form-group {
            margin-bottom: clamp(16px, 4vw, 20px);
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #1e293b;
            font-weight: 600;
            font-size: clamp(13px, 3.5vw, 14px);
        }

        .form-group input {
            width: 100%;
            padding: clamp(14px, 4vw, 16px) clamp(14px, 4vw, 16px);
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: clamp(14px, 4vw, 16px);
            font-family: 'Unbounded', cursive;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-group input[type="password"] {
            letter-spacing: 2px;
        }

        .input-hint {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            font-size: clamp(11px, 3vw, 13px);
            color: #64748b;
        }

        .input-status {
            margin-left: auto;
            font-weight: 500;
        }

        .input-status.success { color: #10b981; }
        .input-status.warning { color: #f59e0b; }
        .input-status.error { color: #ef4444; }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 16px 0;
        }

        .remember-row input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .remember-row label {
            color: #64748b;
            font-size: 14px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: clamp(14px, 4vw, 16px);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: clamp(15px, 4vw, 16px);
            font-weight: 700;
            font-family: 'Unbounded', cursive;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            opacity: 0.85;
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
            box-shadow: none;
            margin-top: 8px;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: clamp(12px, 3.5vw, 13px);
            border-left: 4px solid #dc2626;
            animation: shake 0.3s ease;
        }

        .info-message {
            background: #dbeafe;
            color: #1e40af;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: clamp(12px, 3.5vw, 13px);
            border-left: 4px solid #3b82f6;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Адаптация для маленьких экранов */
        @media screen and (max-width: 360px) {
            body { padding: 8px; }
            .card { padding: 20px 16px; border-radius: 24px; }
            .tab { padding: 8px 4px; font-size: 12px; }
            .btn { padding: 14px; }
        }

        /* Адаптация под высоту */
        @media screen and (max-height: 600px) {
            .card { padding-top: 20px; padding-bottom: 20px; }
            .logo { margin-bottom: 16px; }
            .logo h1 { font-size: 32px; }
            .form-group { margin-bottom: 14px; }
        }

        /* Safe area для iOS */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-top: max(12px, env(safe-area-inset-top));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }

        /* Отключаем hover на тач-устройствах */
        @media (hover: none) and (pointer: coarse) {
            .btn:hover:not(:disabled) { transform: none; box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
            .tab:hover { background: none; }
        }

        /* Фикс для iOS зума */
        @media screen and (-webkit-min-device-pixel-ratio: 0) {
            input[type="text"], input[type="tel"], input[type="password"] {
                font-size: 16px !important;
            }
        }

        .form-section {
            display: block;
        }

        .form-section.hidden {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>Nexgram</h1>
                <p>Общайтесь с друзьями</p>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="login">Вход</button>
                <button class="tab" data-tab="register">Регистрация</button>
            </div>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            {% if info %}
            <div class="info-message">{{ info }}</div>
            {% endif %}

            <!-- ФОРМА ВХОДА -->
            <div id="loginSection" class="form-section">
                <form method="POST" id="loginForm">
                    <input type="hidden" name="action" value="login">

                    <div class="form-group">
                        <label>Номер телефона</label>
                        <input type="tel" name="phone" id="loginPhone"
                               placeholder="+7 999 123 45 67"
                               value="{{ phone or '' }}"
                               required
                               inputmode="tel"
                               autocomplete="tel">
                    </div>

                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" name="password" id="loginPassword"
                               placeholder="••••••••"
                               required
                               autocomplete="current-password">
                    </div>

                    <div class="remember-row">
                        <input type="checkbox" name="remember" id="remember" checked>
                        <label for="remember">Запомнить меня</label>
                    </div>

                    <button type="submit" class="btn" id="loginBtn">Войти</button>
                </form>

                <button class="btn btn-secondary" onclick="switchTab('register')">
                    Создать аккаунт
                </button>
            </div>

            <!-- ФОРМА РЕГИСТРАЦИИ -->
            <div id="registerSection" class="form-section hidden">
                <form method="POST" id="registerForm">
                    <input type="hidden" name="action" value="register_step1">

                    <div class="form-group">
                        <label>Номер телефона</label>
                        <input type="tel" name="phone" id="regPhone"
                               placeholder="+7 999 123 45 67"
                               required
                               inputmode="tel"
                               autocomplete="tel"
                               oninput="checkPhoneNumber(this.value)">
                        <div class="input-hint">
                            <span>🇷🇺 Россия</span>
                            <span class="input-status" id="phoneStatus"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Придумайте пароль</label>
                        <input type="password" name="password" id="regPassword"
                               placeholder="Минимум 8 символов"
                               required
                               autocomplete="new-password"
                               oninput="checkPasswordStrength(this.value)">
                        <div class="input-hint" id="passwordHint">
                            <span>🔒 Надёжный пароль</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Повторите пароль</label>
                        <input type="password" id="regPasswordConfirm"
                               placeholder="••••••••"
                               required
                               autocomplete="new-password"
                               oninput="checkPasswordsMatch()">
                        <div class="input-hint" id="passwordMatchHint"></div>
                    </div>

                    <button type="submit" class="btn" id="registerBtn" disabled>Продолжить</button>
                </form>

                <button class="btn btn-secondary" onclick="switchTab('login')">
                    У меня есть аккаунт
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let phoneCheckTimeout = null;
        let phoneExists = false;
        let registrationComplete = false;
        let passwordValid = false;
        let passwordsMatch = false;

        // ===== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК =====
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const loginSection = document.getElementById('loginSection');
            const registerSection = document.getElementById('registerSection');

            tabs.forEach(t => {
                t.classList.toggle('active', t.dataset.tab === tab);
            });

            if (tab === 'login') {
                loginSection.classList.remove('hidden');
                registerSection.classList.add('hidden');
                document.getElementById('loginPhone').focus();
            } else {
                loginSection.classList.add('hidden');
                registerSection.classList.remove('hidden');
                document.getElementById('regPhone').focus();
            }

            // Обновляем URL без перезагрузки
            const url = new URL(window.location);
            url.searchParams.set('mode', tab);
            window.history.replaceState({}, '', url);
        }

        // ===== ФОРМАТИРОВАНИЕ ТЕЛЕФОНА =====
        function formatPhoneNumber(value) {
            let digits = value.replace(/\D/g, '');

            // Убираем 7 или 8 в начале для форматирования
            if (digits.startsWith('7') || digits.startsWith('8')) {
                digits = digits.substring(1);
            }

            // Ограничиваем 10 цифрами
            digits = digits.substring(0, 10);

            if (digits.length === 0) return '+7 ';
            if (digits.length <= 3) return '+7 ' + digits;
            if (digits.length <= 6) return '+7 ' + digits.substring(0, 3) + ' ' + digits.substring(3);
            if (digits.length <= 8) return '+7 ' + digits.substring(0, 3) + ' ' + digits.substring(3, 6) + ' ' + digits.substring(6);
            return '+7 ' + digits.substring(0, 3) + ' ' + digits.substring(3, 6) + ' ' + digits.substring(6, 8) + ' ' + digits.substring(8);
        }

        // ===== ПРОВЕРКА НОМЕРА ТЕЛЕФОНА =====
        function checkPhoneNumber(value) {
            const input = document.getElementById('regPhone');
            const formatted = formatPhoneNumber(value);
            input.value = formatted;

            const digits = value.replace(/\D/g, '');
            const status = document.getElementById('phoneStatus');
            const registerBtn = document.getElementById('registerBtn');

            // Нужно минимум 11 цифр (7 + 10 цифр номера)
            if (digits.length < 11) {
                status.textContent = '';
                status.className = 'input-status';
                phoneExists = false;
                updateRegisterButton();
                return;
            }

            // Очищаем предыдущий таймаут
            if (phoneCheckTimeout) {
                clearTimeout(phoneCheckTimeout);
            }

            // Проверяем номер с задержкой
            phoneCheckTimeout = setTimeout(() => {
                status.innerHTML = '<span class="spinner"></span> Проверка...';
                status.className = 'input-status';

                fetch('/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `action=check_phone&phone=${encodeURIComponent(formatted)}`
                })
                .then(r => r.json())
                .then(data => {
                    phoneExists = data.exists;
                    registrationComplete = data.registration_complete || false;

                    if (data.exists) {
                        if (data.registration_complete) {
                            status.textContent = '⚠️ Номер уже зарегистрирован';
                            status.className = 'input-status warning';
                        } else {
                            status.textContent = '📝 Регистрация не завершена';
                            status.className = 'input-status warning';
                        }
                    } else {
                        status.textContent = '✅ Номер свободен';
                        status.className = 'input-status success';
                    }

                    updateRegisterButton();
                })
                .catch(() => {
                    status.textContent = '❌ Ошибка проверки';
                    status.className = 'input-status error';
                    phoneExists = false;
                    updateRegisterButton();
                });
            }, 500);
        }

        // ===== ПРОВЕРКА ПАРОЛЯ =====
        function checkPasswordStrength(password) {
            const hint = document.getElementById('passwordHint');
            let strength = 0;
            let message = '';

            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            if (password.length < 8) {
                message = '❌ Минимум 8 символов';
                passwordValid = false;
            } else if (strength <= 2) {
                message = '⚠️ Слабый пароль';
                passwordValid = true;
            } else if (strength <= 3) {
                message = '👍 Средний пароль';
                passwordValid = true;
            } else if (strength <= 4) {
                message = '💪 Хороший пароль';
                passwordValid = true;
            } else {
                message = '🔥 Отличный пароль';
                passwordValid = true;
            }

            hint.innerHTML = `<span>${message}</span>`;
            checkPasswordsMatch();
            updateRegisterButton();
        }

        // ===== ПРОВЕРКА СОВПАДЕНИЯ ПАРОЛЕЙ =====
        function checkPasswordsMatch() {
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;
            const hint = document.getElementById('passwordMatchHint');

            if (!confirm) {
                hint.innerHTML = '';
                passwordsMatch = false;
            } else if (password === confirm) {
                hint.innerHTML = '<span style="color: #10b981;">✅ Пароли совпадают</span>';
                passwordsMatch = true;
            } else {
                hint.innerHTML = '<span style="color: #ef4444;">❌ Пароли не совпадают</span>';
                passwordsMatch = false;
            }

            updateRegisterButton();
        }

        // ===== ОБНОВЛЕНИЕ КНОПКИ РЕГИСТРАЦИИ =====
        function updateRegisterButton() {
            const registerBtn = document.getElementById('registerBtn');
            const phone = document.getElementById('regPhone').value;
            const digits = phone.replace(/\D/g, '');

            // Определяем текст кнопки
            if (phoneExists && !registrationComplete) {
                registerBtn.textContent = 'Завершить регистрацию';
            } else if (phoneExists && registrationComplete) {
                registerBtn.textContent = 'Перейти ко входу';
            } else {
                registerBtn.textContent = 'Продолжить';
            }

            // Валидация
            const isValid = digits.length >= 11 && passwordValid && passwordsMatch;
            registerBtn.disabled = !isValid;
        }

        // ===== ОБРАБОТКА ФОРМ =====
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const registerBtn = document.getElementById('registerBtn');

            // Если номер уже существует с НЕзавершённой регистрацией
            if (phoneExists && !registrationComplete) {
                // Отправляем запрос на завершение регистрации
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<span class="spinner"></span> Загрузка...';

                const formData = new FormData();
                formData.append('action', 'register_step1');
                formData.append('phone', phone);
                formData.append('password', password);

                fetch('/auth', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (response.redirected) {
                        window.location.href = response.url;
                    } else {
                        return response.text();
                    }
                })
                .then(html => {
                    if (html) {
                        // Показываем ошибку если есть
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        const error = doc.querySelector('.error-message');
                        if (error) {
                            alert(error.textContent);
                        }
                        registerBtn.disabled = false;
                        registerBtn.textContent = 'Завершить регистрацию';
                    }
                })
                .catch(() => {
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Завершить регистрацию';
                    alert('Ошибка соединения');
                });

                return;
            }

            // Если номер уже полностью зарегистрирован
            if (phoneExists && registrationComplete) {
                switchTab('login');
                document.getElementById('loginPhone').value = phone;
                document.getElementById('loginPassword').focus();
                return;
            }

            // Обычная регистрация нового пользователя
            this.submit();
        });

        // Обработка кнопки "Перейти ко входу"
        document.getElementById('registerBtn').addEventListener('click', function(e) {
            const phone = document.getElementById('regPhone').value;
            const digits = phone.replace(/\D/g, '');

            // Если номер уже зарегистрирован - переключаем на вход
            if (phoneExists && registrationComplete && digits.length >= 11) {
                e.preventDefault();
                switchTab('login');
                document.getElementById('loginPhone').value = phone;
                document.getElementById('loginPassword').focus();
            }
        });

        // ===== АВТОФОРМАТИРОВАНИЕ ДЛЯ ПОЛЯ ВХОДА =====
        document.getElementById('loginPhone').addEventListener('input', function() {
            this.value = formatPhoneNumber(this.value);
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        document.addEventListener('DOMContentLoaded', function() {
            // Устанавливаем активную вкладку из URL
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || '{{ mode }}' || 'login';

            if (mode === 'register') {
                switchTab('register');
            } else {
                switchTab('login');
            }

            // Обработчики для табов
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    switchTab(this.dataset.tab);
                });
            });

            // Предотвращаем pull-to-refresh на iOS
            let touchStartY = 0;
            document.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                const touchY = e.touches[0].clientY;
                const scrollTop = document.scrollingElement.scrollTop;
                if (scrollTop === 0 && touchY > touchStartY) {
                    e.preventDefault();
                }
            }, { passive: false });

            // Тактильная обратная связь
            document.querySelectorAll('.btn, .tab').forEach(btn => {
                btn.addEventListener('touchstart', () => {
                    if (window.navigator.vibrate) {
                        window.navigator.vibrate(5);
                    }
                }, { passive: true });
            });
        });

        // Фикс для iOS клавиатуры
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('blur', () => {
                    window.scrollTo(0, 0);
                });
            });
        }
    </script>
</body>
</html>
