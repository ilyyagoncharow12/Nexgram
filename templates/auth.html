<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swillgram - Вход / Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Unbounded', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #64748b;
            font-size: 14px;
            margin-top: 8px;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-family: 'Unbounded', cursive;
            font-size: 15px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
            font-family: 'Unbounded', cursive;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .phone-hint {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 13px;
            color: #64748b;
        }
        .phone-status { margin-left: auto; }
        .phone-status.exists { color: #10b981; }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Unbounded', cursive;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .info {
            background: #dbeafe;
            color: #1e40af;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        #registerForm, #loginForm { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>Swillgram</h1>
                <p>Общайтесь с друзьями</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Вход</button>
                <button class="tab" onclick="switchTab('register')">Регистрация</button>
            </div>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <!-- Форма входа -->
            <form method="POST" id="loginForm" style="display: {{ 'block' if mode == 'login' else 'none' }};">
                <input type="hidden" name="action" value="login">
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="tel" name="phone" placeholder="+7 XXX XXX XX XX" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>

            <!-- Форма регистрации (шаг 1) -->
            <form method="POST" id="registerForm" style="display: {{ 'block' if mode == 'register' else 'none' }};">
                <input type="hidden" name="action" value="register_step1">
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="tel" name="phone" id="regPhone" placeholder="+7 XXX XXX XX XX" required oninput="checkPhoneExists(this.value)">
                    <div class="phone-hint">
                        <span>🇷🇺 +7</span>
                        <span class="phone-status" id="phoneStatus"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label>Пароль (мин. 8 символов)</label>
                    <input type="password" name="password" id="regPassword" placeholder="Введите пароль" required oninput="checkPasswordStrength(this.value)">
                    <div class="phone-hint" id="passwordHint"></div>
                </div>
                <button type="submit" class="btn" id="registerBtn">Продолжить</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        function checkPhoneExists(phone) {
            const status = document.getElementById('phoneStatus');
            if (phone.length < 10) {
                status.textContent = '';
                return;
            }

            fetch('/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `action=check_phone&phone=${encodeURIComponent(phone)}`
            })
            .then(r => r.json())
            .then(data => {
                if (data.exists) {
                    status.textContent = data.registration_complete ? '✓ Номер зарегистрирован' : '⚠ Требуется завершить регистрацию';
                    status.className = 'phone-status exists';
                } else {
                    status.textContent = '✓ Номер свободен';
                    status.className = 'phone-status exists';
                }
            });
        }

        function checkPasswordStrength(password) {
            const hint = document.getElementById('passwordHint');
            if (password.length < 8) {
                hint.textContent = 'Минимум 8 символов';
                hint.style.color = '#dc2626';
            } else {
                hint.textContent = '✓ Надёжный пароль';
                hint.style.color = '#10b981';
            }
        }

        // Установка начального таба
        {% if mode == 'register' %}
        switchTab('register');
        {% endif %}
    </script>
</body>
</html>
